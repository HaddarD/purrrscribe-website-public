<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Purrrscribe — About</title>
  <link rel="icon" href="/assets/icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&family=Assistant:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .about-star{width:52px;height:52px;object-fit:contain;flex:none;filter:drop-shadow(0 2px 5px rgba(0,0,0,.28))}
    .about-cat{display:block;width:96px;margin:0 auto 6px;filter:drop-shadow(0 5px 9px rgba(0,0,0,.18))}
    .about-card h3{display:flex;align-items:center;gap:13px}
    .about-card em{color:var(--accent);font-style:italic;font-weight:600}
  </style>
</head>
<body>
  <header class="site-header" id="site-header"></header>
  <main id="main">
    <section class="container">
      <img class="about-cat" src="/assets/icon.png" alt="">
      <div class="section-head">
        <span class="eyebrow" data-i18n="nav.about">About</span>
        <h1>About Purrrscribe</h1>
        <p class="muted" data-i18n="about.lead">A privacy-first voice app, built by one stubborn Texan and five rescue cats.</p>
      </div>

      <div class="card about-card" style="max-width:760px;margin:0 auto 16px">
        <h3 data-i18n="about.whatTitle">What it does</h3>
        <p class="muted" data-i18n="about.wd1"></p>
        <p class="muted" data-i18n="about.wd2"></p>
        <p class="muted" data-i18n="about.wd3"></p>
      </div>

      <div class="card about-card" style="max-width:760px;margin:0 auto">
        <h3><img class="about-star" src="/assets/Gold_Star.png" alt="Gold Star pin"><span data-i18n="about.whoTitle">Who's behind it</span></h3>
        <p class="muted" data-i18n="about.wb1"></p>
        <p class="muted" data-i18n="about.wb2"></p>
        <p class="muted" data-i18n-html="about.wb3"></p>
        <p class="muted" data-i18n="about.wb4"></p>
      </div>
    </section>
  </main>
  <footer class="site-footer" id="site-footer"></footer>
  <script src="/js/site.js"></script>
</body>
</html>
