# Purrrscribe — pre-commit framework config
# ALERT-AND-BLOCK ONLY. Nothing in this config silently modifies files.
# If something looks wrong, the commit is blocked and you decide what to do —
# nothing gets auto-corrected behind your back.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=25000']
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
